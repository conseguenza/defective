<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Under Construction</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            position: relative;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(100, 100, 255, 0.1) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.3;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.5;
            }
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 2rem;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff, #8b8bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .status {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #8b8bff;
            margin-bottom: 2rem;
            font-weight: 500;
        }
        
        .message {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 2rem;
            max-width: 500px;
            line-height: 1.6;
        }

        .loader {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 3px solid rgba(139, 139, 255, 0.2);
            border-top-color: #8b8bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 2rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .telegram-link {
            margin-top: 2rem;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(139, 139, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            border: 1px solid rgba(139, 139, 255, 0.3);
            cursor: pointer;
        }

        .telegram-link:hover {
            background: rgba(139, 139, 255, 0.2);
            transform: translateY(-2px);
            border-color: #8b8bff;
        }

        .telegram-link svg {
            width: 24px;
            height: 24px;
            fill: #8b8bff;
        }

        .telegram-link span {
            font-size: 1rem;
            font-weight: 500;
        }

        .footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8rem;
            color: #444;
        }

        .redirect-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .redirect-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .redirect-content {
            text-align: center;
            padding: 2rem;
        }

        .redirect-loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(139, 139, 255, 0.2);
            border-top-color: #8b8bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        .redirect-content p {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .redirect-content small {
            color: #8b8bff;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2.5rem;
            }
            .message {
                font-size: 1rem;
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <div class="logo">snipex.lol</div>
        <div class="status">UNDER CONSTRUCTION</div>
        <div class="message">
            We're working hard to bring you something amazing.<br>
            Stay tuned for updates.
        </div>
        <div class="telegram-link" id="redirectBtn">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.95 1.24-5.5 3.63-.52.36-.99.53-1.41.52-.46-.01-1.35-.26-2.01-.48-.81-.27-1.45-.42-1.4-.89.03-.25.37-.51.99-.78 3.85-1.68 6.42-2.78 7.71-3.31 3.67-1.52 4.43-1.78 4.93-1.79.11 0 .35.02.51.17.13.12.17.29.18.45-.02.02-.02.09-.01.15z"/>
            </svg>
            <span>Discord Server</span>
        </div>
    </div>
    <div class="footer">
        &copy; 2026 snipex.lol • powered by kidnap.lol
    </div>

    <div class="redirect-overlay" id="redirectOverlay">
        <div class="redirect-content">
            <div class="redirect-loader"></div>
            <p>Redirecting to Discord access</p>
            <small>snipex.lol/discord</small>
        </div>
    </div>

    <script>
        const redirectBtn = document.getElementById('redirectBtn');
        const overlay = document.getElementById('redirectOverlay');
        let redirectTimeout;

        function redirectToDiscordPage() {
            overlay.classList.add('active');
            
            redirectTimeout = setTimeout(function() {
                window.location.href = '/discord.html';
            }, 1200);
        }

        redirectBtn.addEventListener('click', function(e) {
            e.preventDefault();
            redirectToDiscordPage();
        });

        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
            return false;
        });
        
        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
            return false;
        });
        
        document.onkeydown = function(e) {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'C' || e.key === 'u' || e.key === 'U')) {
                e.preventDefault();
                return false;
            }
            if (e.key === 'F12') {
                e.preventDefault();
                return false;
            }
        };
    </script>
</body>
</html>
