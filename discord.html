<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>snipex.lol · discord</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #0f0f17 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .card {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            border: 1px solid rgba(139, 139, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .discord-icon {
            margin-bottom: 1rem;
        }

        .discord-icon svg {
            width: 70px;
            height: 70px;
        }

        .site-name {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #8b8bff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .discord-link {
            font-size: 0.9rem;
            color: #5865f2;
            margin-bottom: 2rem;
            font-family: monospace;
        }

        .captcha-container {
            display: flex;
            justify-content: center;
            margin: 1.5rem 0;
            min-height: 85px;
        }

        .status {
            font-size: 0.85rem;
            margin-top: 1rem;
            padding: 0.5rem;
            border-radius: 50px;
            color: #aaa;
        }

        .status.redirecting {
            color: #8bff9e;
        }

        .status.error {
            color: #ff8a8a;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(139, 255, 158, 0.3);
            border-top-color: #8bff9e;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .card {
                padding: 1.5rem;
            }
            .site-name {
                font-size: 1.6rem;
            }
            .discord-icon svg {
                width: 55px;
                height: 55px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="discord-icon">
            <svg viewBox="0 0 127.14 96.36" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path fill="#5865F2" d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.86.68,1.76,1.36,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S53.8,46,53.87,53,48.81,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.2,60,73.2,53s5-12.74,11.43-12.74S96,46,96.1,53,91.08,65.69,84.69,65.69Z"/>
            </svg>
        </div>
        <div class="site-name">snipex.lol</div>

        <div class="captcha-container">
            <div id="captcha-box"></div>
        </div>

        <div id="statusMsg" class="status">✓ Complete the captcha to join Discord</div>
    </div>

    <script>
        let redirecting = false;
        const statusMsg = document.getElementById('statusMsg');

        function redirect() {
            if (redirecting) return;
            redirecting = true;
            
            statusMsg.innerHTML = '<span class="spinner"></span> Verified! Redirecting to Discord...';
            statusMsg.className = 'status redirecting';
            
            setTimeout(function() {
                window.location.href = 'https://discord.gg/snipex';
            }, 800);
        }

        function onTurnstileLoad() {
            turnstile.render('#captcha-box', {
                sitekey: '0x4AAAAAAAQVgS_r_3u_iX2R',
                callback: function(token) {
                    redirect();
                },
                'expired-callback': function() {
                    statusMsg.innerHTML = '⌛ Captcha expired — please try again';
                    statusMsg.className = 'status error';
                    redirecting = false;
                },
                'error-callback': function() {
                    statusMsg.innerHTML = '⚠️ Error loading captcha — refresh page';
                    statusMsg.className = 'status error';
                },
                theme: 'dark',
                size: 'normal'
            });
        }

        if (window.turnstile) {
            onTurnstileLoad();
        }

        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
            return false;
        });
        
        document.onkeydown = function(e) {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'C' || e.key === 'u' || e.key === 'U')) {
                e.preventDefault();
                return false;
            }
            if (e.key === 'F12') {
                e.preventDefault();
                return false;
            }
        };
    </script>
</body>
</html>
